<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinCC OA No-Code Pro Studio</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #1e1e1e; color: white; overflow: hidden; }
        .header { background: #00274c; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #005a9e; flex-wrap: wrap; }
        .main { display: flex; flex: 1; overflow: hidden; flex-direction: row; }
        #blocklyDiv { flex: 3; background: #f0f2f5; position: relative; }
        .side { flex: 2; display: flex; flex-direction: column; min-width: 350px; border-left: 1px solid #333; background: #252526; }
        #monacoContainer { flex: 1; width: 100%; min-height: 200px; }
        .btns { padding: 15px; background: #252526; text-align: right; border-top: 1px solid #444; }
        button { cursor: pointer; padding: 10px 20px; background: #0078d4; color: white; border: none; border-radius: 4px; font-weight: bold; width: 100%; transition: 0.2s; }
        button:hover { background: #005a9e; }
        .label { padding: 8px 20px; background: #252526; font-size: 0.8em; color: #9cdcfe; font-weight: bold; border-bottom: 1px solid #333; }

        @media (max-width: 900px) {
            .main { flex-direction: column; overflow-y: auto; }
            #blocklyDiv { flex: none; height: 50vh; width: 100%; }
            .side { flex: none; height: 50vh; width: 100%; border-left: none; border-top: 2px solid #333; }
            button { width: auto; }
        }
    </style>
</head>
<body>

<div class="header">
    <div>WinCC OA <strong>CTRL Studio</strong></div>
    <div style="font-size: 0.8em; opacity: 0.8;" id="status">Chargement...</div>
</div>

<div class="main">
    <div id="blocklyDiv"></div>
    <div class="side">
        <div class="label">VISUALISEUR CTRL</div>
        <div id="monacoContainer"></div>
        <div class="btns">
            <button onclick="downloadCode()">Télécharger le script (.ctl)</button>
        </div>
    </div>
</div>

<xml id="toolbox" style="display: none">
    <category name="Variables" colour="160">
        <block type="wincc_var"></block>
        <block type="wincc_var_dyn"></block>
    </category>
    <category name="DP Access" colour="230">
        <block type="wincc_dpget"></block>
        <block type="wincc_dpset"></block>
        <block type="wincc_dpexists"></block>
    </category>
    <category name="Tableaux (Dyn)" colour="260">
        <block type="wincc_dynappend"></block>
        <block type="wincc_dynlen"></block>
    </category>
    <category name="Logique" colour="210">
        <block type="logic_operation"></block>
        <block type="wincc_if_ultimate"></block>
        <block type="wincc_if_else"></block>
        <block type="wincc_delay"></block>
        <block type="wincc_debug"></block>
    </category>
</xml>

<script>
    let editor;
    let workspace;

    // 1. CHARGEMENT MONACO
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('monacoContainer'), {
            value: "int main()\n{\n    return 0;\n}",
            language: 'cpp',
            theme: 'vs-dark',
            readOnly: true,
            automaticLayout: true,
            minimap: { enabled: false },
            fontSize: 13
        });
        document.getElementById('status').innerText = "Prêt";
        initBlockly();
    });

    // 2. BLOCS & GÉNÉRATEUR
    function initBlockly() {
        Blockly.defineBlocksWithJsonArray([
            // Variables
            { "type": "wincc_var", "message0": "Déclarer %1 %2 = %3", "args0": [{ "type": "field_dropdown", "name": "T", "options": [["int","int"],["float","float"],["bool","bool"],["string","string"]] }, { "type": "field_input", "name": "N", "text": "maVar" }, { "type": "field_input", "name": "V", "text": "0" }], "previousStatement": null, "nextStatement": null, "colour": 160 },
            { "type": "wincc_var_dyn", "message0": "Déclarer tableau %1 %2", "args0": [{ "type": "field_dropdown", "name": "T", "options": [["dyn_int","dyn_int"],["dyn_float","dyn_float"],["dyn_string","dyn_string"]] }, { "type": "field_input", "name": "N", "text": "monTableau" }], "previousStatement": null, "nextStatement": null, "colour": 160 },
            
            // DP Access
            { "type": "wincc_dpget", "message0": "dpGet( %1, %2 )", "args0": [{ "type": "field_input", "name": "DP", "text": "Point.Element" }, { "type": "field_input", "name": "V", "text": "maVar" }], "previousStatement": null, "nextStatement": null, "colour": 230 },
            { "type": "wincc_dpset", "message0": "dpSet( %1, %2 )", "args0": [{ "type": "field_input", "name": "DP", "text": "Point.Element" }, { "type": "field_input", "name": "V", "text": "1" }], "previousStatement": null, "nextStatement": null, "colour": 230 },
            { "type": "wincc_dpexists", "message0": "%1 = dpExists( %2 )", "args0": [{ "type": "field_input", "name": "R", "text": "existe" }, { "type": "field_input", "name": "DP", "text": "NomDP" }], "previousStatement": null, "nextStatement": null, "colour": 230 },
            
            // Dyn
            { "type": "wincc_dynappend", "message0": "dynAppend( %1, %2 )", "args0": [{ "type": "field_input", "name": "T", "text": "monTableau" }, { "type": "field_input", "name": "V", "text": "valeur" }], "previousStatement": null, "nextStatement": null, "colour": 260 },
            { "type": "wincc_dynlen", "message0": "%1 = dynlen( %2 )", "args0": [{ "type": "field_input", "name": "R", "text": "taille" }, { "type": "field_input", "name": "T", "text": "monTableau" }], "previousStatement": null, "nextStatement": null, "colour": 260 },
            
            // Logique avancée
            {
                "type": "logic_operation",
                "message0": "%1 %2 %3",
                "args0": [
                    { "type": "field_input", "name": "A", "text": "var1" },
                    { "type": "field_dropdown", "name": "OP", "options": [
                        ["==", "=="], ["!=", "!="], [">", ">"], ["<", "<"], 
                        [">=", ">="], ["<=", "<="], ["ET (&&)", "&&"], ["OU (||)", "||"]
                    ]},
                    { "type": "field_input", "name": "B", "text": "var2" }
                ],
                "output": null,
                "colour": 210
            },
            {
                "type": "wincc_if_ultimate",
                "message0": "Si %1 alors",
                "args0": [{ "type": "input_value", "name": "CONDITION" }],
                "message1": "{ %1 }",
                "args1": [{ "type": "input_statement", "name": "DO" }],
                "previousStatement": null, "nextStatement": null, "colour": 210
            },
            {
                "type": "wincc_if_else",
                "message0": "Si %1 alors",
                "args0": [{ "type": "input_value", "name": "CONDITION" }],
                "message1": "{ %1 }",
                "args1": [{ "type": "input_statement", "name": "DO" }],
                "message2": "Sinon",
                "message3": "{ %1 }",
                "args3": [{ "type": "input_statement", "name": "ELSE" }],
                "previousStatement": null, "nextStatement": null, "colour": 210
            },
            
            // Système
            { "type": "wincc_debug", "message0": "DebugN( %1 )", "args0": [{ "type": "field_input", "name": "T", "text": "Log" }], "previousStatement": null, "nextStatement": null, "colour": 120 },
            { "type": "wincc_delay", "message0": "delay( %1, %2 )", "args0": [{ "type": "field_number", "name": "S", "value": 1 }, { "type": "field_number", "name": "M", "value": 0 }], "previousStatement": null, "nextStatement": null, "colour": 120 }
        ]);

        const G = new Blockly.Generator('CTRL');
        G.scrub_ = (b, c, o) => { const n = b.getNextBlock(); return c + (o ? '' : G.blockToCode(n)); };

        // Traducteurs
        G.forBlock['wincc_var'] = b => `${b.getFieldValue('T')} ${b.getFieldValue('N')} = ${b.getFieldValue('V')};\n`;
        G.forBlock['wincc_var_dyn'] = b => `${b.getFieldValue('T')} ${b.getFieldValue('N')};\n`;
        G.forBlock['wincc_dpget'] = b => `dpGet("${b.getFieldValue('DP')}", ${b.getFieldValue('V')});\n`;
        G.forBlock['wincc_dpset'] = b => `dpSet("${b.getFieldValue('DP')}", ${b.getFieldValue('V')});\n`;
        G.forBlock['wincc_dpexists'] = b => `${b.getFieldValue('R')} = dpExists("${b.getFieldValue('DP')}");\n`;
        G.forBlock['wincc_dynappend'] = b => `dynAppend(${b.getFieldValue('T')}, ${b.getFieldValue('V')});\n`;
        G.forBlock['wincc_dynlen'] = b => `${b.getFieldValue('R')} = dynlen(${b.getFieldValue('T')});\n`;
        G.forBlock['wincc_debug'] = b => `DebugN("${b.getFieldValue('T')}");\n`;
        G.forBlock['wincc_delay'] = b => `delay(${b.getFieldValue('S')}, ${b.getFieldValue('M')});\n`;
        
        G.forBlock['logic_operation'] = b => {
            const a = b.getFieldValue('A');
            const op = b.getFieldValue('OP');
            const bVal = b.getFieldValue('B');
            return [`(${a} ${op} ${bVal})`, 0];
        };

        G.forBlock['wincc_if_ultimate'] = b => {
            const condition = G.valueToCode(b, 'CONDITION', 0) || "true";
            const branch = G.statementToCode(b, 'DO');
            return `if ${condition} {\n${branch}}\n`;
        };

        G.forBlock['wincc_if_else'] = b => {
            const condition = G.valueToCode(b, 'CONDITION', 0) || "true";
            const branch = G.statementToCode(b, 'DO');
            const elseBranch = G.statementToCode(b, 'ELSE');
            return `if ${condition} {\n${branch}}\nelse {\n${elseBranch}}\n`;
        };

        workspace = Blockly.inject('blocklyDiv', { 
            toolbox: document.getElementById('toolbox'),
            grid: {spacing: 20, length: 3, colour: '#ccc', snap: true},
            zoom: {controls: true, wheel: true, startScale: 1.0, maxScale: 3, minScale: 0.3, scaleSpeed: 1.2}
        });

        workspace.addChangeListener(() => {
            const code = G.workspaceToCode(workspace);
            const indented = code.split('\n').map(l => l ? '    ' + l : '').join('\n');
            const final = `int main()\n{\n${indented}\n    return 0;\n}`;
            if (editor) editor.setValue(final);
        });

        window.addEventListener('resize', () => {
            Blockly.svgResize(workspace);
        }, false);
    }

    function downloadCode() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([editor.getValue()], {type: "text/plain"}));
        a.download = "script_wincc.ctl"; 
        a.click();
    }
</script>
</body>
</html>
