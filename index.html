<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WinCC OA No-Code Studio</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; }
        .header { background: #00274c; color: white; padding: 12px 20px; font-size: 1.2em; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .main { display: flex; flex: 1; overflow: hidden; }
        #blocklyDiv { flex: 2; border-right: 1px solid #ccc; }
        .side { flex: 1; background: #1e1e1e; display: flex; flex-direction: column; min-width: 400px; }
        #codeArea { flex: 1; background: #1e1e1e; color: #9cdcfe; padding: 20px; font-family: 'Consolas', 'Monaco', monospace; border: none; resize: none; font-size: 13px; line-height: 1.5; }
        .btns { padding: 15px; background: #2d2d2d; border-top: 1px solid #444; text-align: right; }
        button { cursor: pointer; padding: 10px 20px; background: #0078d4; color: white; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #005a9e; }
    </style>
</head>
<body>

<div class="header">
    WinCC OA <strong>CTRL Builder</strong> <span style="font-size: 0.7em; opacity: 0.7;">(V2.0 - Synchronous & Dyn)</span>
</div>

<div class="main">
    <div id="blocklyDiv"></div>
    <div class="side">
        <div style="color: #888; padding: 10px 20px; font-size: 0.8em; background: #252526;">PREVIEW: .CTL FILE</div>
        <textarea id="codeArea" readonly></textarea>
        <div class="btns">
            <button onclick="downloadCode()">Exporter le script (.ctl)</button>
        </div>
    </div>
</div>

<xml id="toolbox" style="display: none">
    <category name="Variables" colour="160">
        <block type="wincc_variable"></block>
        <block type="wincc_variable_dyn"></block>
    </category>
    <category name="WinCC OA Core" colour="230">
        <block type="wincc_dpget"></block>
        <block type="wincc_dpset"></block>
        <block type="wincc_dpexists"></block>
        <block type="wincc_dptypename"></block>
    </category>
    <category name="Tableaux (Dyn)" colour="260">
        <block type="wincc_dynappend"></block>
        <block type="wincc_dynremove"></block>
        <block type="wincc_dynlen"></block>
    </category>
    <category name="Logique & Temps" colour="210">
        <block type="logic_if_custom"></block>
        <block type="wincc_delay"></block>
        <block type="wincc_debug"></block>
    </category>
</xml>

<script>
    // 1. DÉFINITION DES BLOCS
    Blockly.defineBlocksWithJsonArray([
        // Variables simples
        {
            "type": "wincc_variable",
            "message0": "Déclarer %1 %2 = %3",
            "args0": [
                { "type": "field_dropdown", "name": "TYPE", "options": [["bool", "bool"], ["int", "int"], ["float", "float"], ["string", "string"], ["time", "time"]] },
                { "type": "field_input", "name": "VAR_NAME", "text": "maVar" },
                { "type": "field_input", "name": "VALUE", "text": "0" }
            ],
            "previousStatement": null, "nextStatement": null, "colour": 160
        },
        // Déclaration Dyn
        {
            "type": "wincc_variable_dyn",
            "message0": "Déclarer tableau %1 %2",
            "args0": [
                { "type": "field_dropdown", "name": "TYPE", "options": [["dyn_int", "dyn_int"], ["dyn_float", "dyn_float"], ["dyn_string", "dyn_string"], ["dyn_bool", "dyn_bool"]] },
                { "type": "field_input", "name": "VAR_NAME", "text": "monTableau" }
            ],
            "previousStatement": null, "nextStatement": null, "colour": 160
        },
        // dpGet
        {
            "type": "wincc_dpget",
            "message0": "dpGet( %1 , %2 )",
            "args0": [
                { "type": "field_input", "name": "DP_NAME", "text": "System1:Point.Element" },
                { "type": "field_input", "name": "VAR_NAME", "text": "maVar" }
            ],
            "previousStatement": null, "nextStatement": null, "colour": 230
        },
        // dpSet
        {
            "type": "wincc_dpset",
            "message0": "dpSet( %1 , %2 )",
            "args0": [
                { "type": "field_input", "name": "DP_NAME", "text": "System1:Point.Element" },
                { "type": "field_input", "name": "VALUE", "text": "1" }
            ],
            "previousStatement": null, "nextStatement": null, "colour": 230
        },
        // dpExists
        {
            "type": "wincc_dpexists",
            "message0": "Si DP existe %1 stocker dans %2",
            "args0": [
                { "type": "field_input", "name": "DP_NAME", "text": "System1:Point" },
                { "type": "field_input", "name": "VAR_NAME", "text": "existeBool" }
            ],
            "previousStatement": null, "nextStatement": null, "colour": 230
        },
        // dpTypeName
        {
            "type": "wincc_dptypename",
            "message0": "Type de %1 → %2",
            "args0": [
                { "type": "field_input", "name": "DP_NAME", "text": "System1:Point" },
                { "type": "field_input", "name": "VAR_NAME", "text": "nomType" }
            ],
            "previousStatement": null, "nextStatement": null, "colour": 230
        },
        // dynAppend
        {
            "type": "wincc_dynappend",
            "message0": "dynAppend( %1 , %2 )",
            "args0": [
                { "type": "field_input", "name": "VAR_NAME", "text": "monTableau" },
                { "type": "field_input", "name": "VALUE", "text": "valeur" }
            ],
            "previousStatement": null, "nextStatement": null, "colour": 260
        },
        // dynRemove
        {
            "type": "wincc_dynremove",
            "message0": "dynRemove( %1 , index: %2 )",
            "args0": [
                { "type": "field_input", "name": "VAR_NAME", "text": "monTableau" },
                { "type": "field_input", "name": "IDX", "text": "1" }
            ],
            "previousStatement": null, "nextStatement": null, "colour": 260
        },
        // dynLen
        {
            "type": "wincc_dynlen",
            "message0": "Longueur de %1 → %2",
            "args0": [
                { "type": "field_input", "name": "VAR_NAME", "text": "monTableau" },
                { "type": "field_input", "name": "RES_NAME", "text": "taille" }
            ],
            "previousStatement": null, "nextStatement": null, "colour": 260
        },
        // Delay
        {
            "type": "wincc_delay",
            "message0": "delay( %1 , %2 )",
            "args0": [
                { "type": "field_number", "name": "SEC", "value": 1 },
                { "type": "field_number", "name": "MILLI", "value": 0 }
            ],
            "previousStatement": null, "nextStatement": null, "colour": 210
        },
        // DebugN
        {
            "type": "wincc_debug",
            "message0": "DebugN( %1 )",
            "args0": [{ "type": "field_input", "name": "TEXT", "text": "Log Message" }],
            "previousStatement": null, "nextStatement": null, "colour": 120
        },
        // IF
        {
            "type": "logic_if_custom",
            "message0": "if ( %1 %2 %3 )",
            "args0": [
                { "type": "field_input", "name": "VAR", "text": "maVar" },
                { "type": "field_dropdown", "name": "OP", "options": [["==", "=="], ["!=", "!="], [">", ">"], ["<", "<"], [">=", ">="], ["<=", "<="]] },
                { "type": "field_input", "name": "VAL_COMP", "text": "1" }
            ],
            "message1": "then %1",
            "args1": [{ "type": "input_statement", "name": "DO" }],
            "previousStatement": null, "nextStatement": null, "colour": 210
        }
    ]);

    // 2. GÉNÉRATEUR CTRL
    const ctrlGenerator = new Blockly.Generator('CTRL');
    
    ctrlGenerator.scrub_ = function(block, code, opt_thisOnly) {
        const nextBlock = block.getNextBlock();
        const nextCode = opt_thisOnly ? '' : ctrlGenerator.blockToCode(nextBlock);
        return code + nextCode;
    };

    ctrlGenerator.forBlock['wincc_variable'] = b => {
        let val = b.getFieldValue('VALUE');
        if(b.getFieldValue('TYPE') === 'string' && !val.includes('"')) val = `"${val}"`;
        return `${b.getFieldValue('TYPE')} ${b.getFieldValue('VAR_NAME')} = ${val};\n`;
    };

    ctrlGenerator.forBlock['wincc_variable_dyn'] = b => `${b.getFieldValue('TYPE')} ${b.getFieldValue('VAR_NAME')};\n`;
    ctrlGenerator.forBlock['wincc_dpget'] = b => `dpGet("${b.getFieldValue('DP_NAME')}", ${b.getFieldValue('VAR_NAME')});\n`;
    ctrlGenerator.forBlock['wincc_dpset'] = b => `dpSet("${b.getFieldValue('DP_NAME')}", ${b.getFieldValue('VALUE')});\n`;
    ctrlGenerator.forBlock['wincc_dpexists'] = b => `${b.getFieldValue('VAR_NAME')} = dpExists("${b.getFieldValue('DP_NAME')}");\n`;
    ctrlGenerator.forBlock['wincc_dptypename'] = b => `${b.getFieldValue('VAR_NAME')} = dpTypeName("${b.getFieldValue('DP_NAME')}");\n`;
    
    ctrlGenerator.forBlock['wincc_dynappend'] = b => `dynAppend(${b.getFieldValue('VAR_NAME')}, ${b.getFieldValue('VALUE')});\n`;
    ctrlGenerator.forBlock['wincc_dynremove'] = b => `dynRemove(${b.getFieldValue('VAR_NAME')}, ${b.getFieldValue('IDX')});\n`;
    ctrlGenerator.forBlock['wincc_dynlen'] = b => `${b.getFieldValue('RES_NAME')} = dynlen(${b.getFieldValue('VAR_NAME')});\n`;

    ctrlGenerator.forBlock['wincc_delay'] = b => `delay(${b.getFieldValue('SEC')}, ${b.getFieldValue('MILLI')});\n`;
    ctrlGenerator.forBlock['wincc_debug'] = b => `DebugN("${b.getFieldValue('TEXT')}");\n`;
    
    ctrlGenerator.forBlock['logic_if_custom'] = b => {
        const branch = ctrlGenerator.statementToCode(b, 'DO');
        return `if (${b.getFieldValue('VAR')} ${b.getFieldValue('OP')} ${b.getFieldValue('VAL_COMP')}) {\n${branch}}\n`;
    };

    // 3. INITIALISATION
    const workspace = Blockly.inject('blocklyDiv', {
        toolbox: document.getElementById('toolbox'),
        grid: {spacing: 20, length: 3, colour: '#ddd', snap: true},
        zoom: {controls: true, wheel: true}
    });

    function generateCode() {
        const bodyCode = ctrlGenerator.workspaceToCode(workspace);
        const indented = bodyCode.split('\n').map(line => line ? '    ' + line : '').join('\n');
        const finalCode = `int main()\n{\n${indented}\n    return 0;\n}`;
        document.getElementById('codeArea').value = finalCode;
    }

    workspace.addChangeListener(generateCode);
    generateCode(); // Init au chargement

    function downloadCode() {
        const code = document.getElementById('codeArea').value;
        const blob = new Blob([code], {type: "text/plain"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "script_wincc.ctl";
        a.click();
    }
</script>
</body>
</html>
