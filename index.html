<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WinCC OA No-Code V1</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f0f2f5; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #blocklyDiv { height: 400px; width: 100%; border: 1px solid #ddd; border-radius: 4px; }
        #codeArea { width: 100%; height: 150px; background: #1e1e1e; color: #d4d4d4; padding: 15px; font-family: 'Consolas', monospace; border-radius: 4px; margin-top: 15px; box-sizing: border-box; }
        button { background: #0078d4; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #005a9e; }
    </style>
</head>
<body>

<div class="container">
    <h2>WinCC OA CTRL Generator</h2>
    
    <div id="blocklyDiv"></div>

    <xml id="toolbox" style="display: none">
        <category name="WinCC OA" colour="#5b67a5">
            <block type="wincc_dpget"></block>
        </category>
    </xml>

    <h3>Code CTRL Généré :</h3>
    <textarea id="codeArea" readonly placeholder="Le code apparaîtra ici..."></textarea>
    <button onclick="downloadCode()">Télécharger .ctl</button>
</div>

<script>
    // 1. Définition du bloc WinCC OA
    Blockly.defineBlocksWithJsonArray([{
      "type": "wincc_dpget",
      "message0": "Lire le DP : %1 stocker dans : %2",
      "args0": [
        { "type": "field_input", "name": "DP_NAME", "text": "System1:Motor.status" },
        { "type": "field_input", "name": "VAR_NAME", "text": "valeur" }
      ],
      "previousStatement": null,
      "nextStatement": null,
      "colour": 230,
      "tooltip": "Lit une valeur de Datapoint WinCC OA",
      "helpUrl": ""
    }]);

    // 2. Création du générateur de langage "CTRL"
    const ctrlGenerator = new Blockly.Generator('CTRL');
    
    // IMPORTANT : Indiquer comment gérer les blocs inconnus
    ctrlGenerator.scrub_ = function(block, code, opt_thisOnly) {
        const nextBlock = block.getNextBlock();
        const nextCode = opt_thisOnly ? '' : ctrlGenerator.blockToCode(nextBlock);
        return code + nextCode;
    };

    // Logique de transformation du bloc en texte
    ctrlGenerator.forBlock['wincc_dpget'] = function(block) {
      const dpName = block.getFieldValue('DP_NAME');
      const varName = block.getFieldValue('VAR_NAME');
      // On retourne le code sous forme de chaîne
      return `anytype ${varName};\ndpGet("${dpName}", ${varName});\nDebugN("Valeur lue :", ${varName});\n`;
    };

    // 3. Injection de Blockly dans la page
    const workspace = Blockly.inject('blocklyDiv', {
        toolbox: document.getElementById('toolbox'),
        scrollbars: true
    });

    // 4. Fonction de mise à jour automatique
    function updateCode() {
        const code = ctrlGenerator.workspaceToCode(workspace);
        document.getElementById('codeArea').value = code;
    }

    // Écouter les changements
    workspace.addChangeListener(updateCode);

    // 5. Fonction de téléchargement
    function downloadCode() {
        const code = document.getElementById('codeArea').value;
        if(!code) return alert("Veuillez ajouter des blocs !");
        const blob = new Blob([code], {type: "text/plain"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "logic.ctl";
        a.click();
    }
</script>

</body>
</html>
