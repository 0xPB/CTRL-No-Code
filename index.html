<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinCC OA No-Code Platform</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #00274c; color: white; padding: 1rem 2rem; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .main-content { display: flex; flex: 1; overflow: hidden; }
        #blocklyDiv { flex: 2; border-right: 2px solid #ddd; }
        .output-panel { flex: 1; display: flex; flex-direction: column; background: #1e1e1e; color: #d4d4d4; }
        .output-panel h3 { padding: 10px; margin: 0; background: #333; font-size: 14px; color: #aaa; }
        #codeArea { flex: 1; width: 100%; border: none; background: transparent; color: #9cdcfe; padding: 15px; font-family: 'Consolas', monospace; resize: none; outline: none; }
        .actions { padding: 10px; background: #333; display: flex; justify-content: flex-end; }
        button { background: #0078d4; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #005a9e; }
    </style>
</head>
<body>

<header>
    <h1>WinCC OA - CTRL Generator v1.1</h1>
</header>

<div class="main-content">
    <div id="blocklyDiv"></div>

    <div class="output-panel">
        <h3>SCRIPT GENERATED (.CTL)</h3>
        <textarea id="codeArea" readonly placeholder="Glissez des blocs pour générer du code..."></textarea>
        <div class="actions">
            <button onclick="downloadCode()">Télécharger .ctl</button>
        </div>
    </div>
</div>

<xml id="toolbox" style="display: none">
    <category name="Variables" colour="160">
        <block type="wincc_variable"></block>
    </category>
    <category name="WinCC OA" colour="#5b67a5">
        <block type="wincc_dpget"></block>
        <block type="wincc_dpset"></block>
        <block type="wincc_delay"></block>
        <block type="wincc_debug"></block>
    </category>
    <category name="Logique" colour="#5bA55B">
        <block type="logic_if_custom"></block>
    </category>
</xml>

<script src="logic.js"></script>
</body>
</html>
